#            authorization-uri: http://192.168.10.161:8080/realms/Portal/auth
#            token-uri: http://192.168.10.161:8080/realms/Portal/token
#            user-info-uri: http://192.168.10.161:8080/realms/Portal/userinfo
#            jwk-set-uri: http://192.168.10.161:8080/realms/Portal/certs


logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %level - %logger{45} - %msg %n"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: localhost

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html


