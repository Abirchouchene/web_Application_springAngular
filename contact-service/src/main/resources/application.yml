server:
  port: 8081

spring:
  application:
    name: contact-service
  datasource:
    url: jdbc:mysql://192.168.10.161:3306/contact?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  mvc:
    format:
      date: yyyy-MM-dd
  # Spring Security OAuth2 configuration
#  security:
