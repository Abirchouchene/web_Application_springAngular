# ============================================================
# PROFIL dev-local : CallCenter sans VPN (H2 + pas de Keycloak)
# Lancer avec : mvn spring-boot:run -Dspring-boot.run.profiles=dev-local
# ============================================================
spring.application.name=CallCenter
server.servlet.context-path=/api
server.port=8082

### EUREKA ###
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

### H2 DATABASE (remplace MySQL VPN) ###
spring.datasource.url=jdbc:h2:mem:callcenter;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

### JPA ###
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.mvc.format.date=yyyy-MM-dd
logging.level.root=INFO

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=C:/callcenter/files/
spring.main.allow-bean-definition-overriding=true

### DESACTIVER Keycloak Admin Client (pas de VPN) ###
keycloak.auth-server-url=http://localhost:9999/realms/Portal
keycloak.realm=Portal
keycloak.client-id=callcenter-backend
keycloak.client-secret=fake-secret

### DESACTIVER OAuth2 Client Registration ###
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

### JWT - pas de validation (sera gere par DevLocalSecurityConfig) ###
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=
jwt.auth.converter.principal-attribute=sub
