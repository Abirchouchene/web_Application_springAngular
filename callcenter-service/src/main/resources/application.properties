spring.application.name=CallCenter
server.servlet.context-path=/api
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

### EUREKA CLIENT ###
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

### DATABASE ###
spring.datasource.url=jdbc:mysql://192.168.10.161:3306/call-center
spring.datasource.username=root
spring.datasource.password=root
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.default_batch_fetch_size=30
spring.jpa.open-in-view=true
##
spring.mvc.format.date=yyyy-MM-dd
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d {yyyy-MM-dd HH:mm:ss} - %level - %logger{45} - %msg %n 
#Swagger : http://localhost:8082/api/swagger-ui/index.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=C:/callcenter/files/
spring.main.allow-bean-definition-overriding=true

