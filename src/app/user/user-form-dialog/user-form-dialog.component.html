<h1 mat-dialog-title>{{ data.user ? 'Modifier Utilisateur' : 'Ajouter Utilisateur' }}</h1>
<div mat-dialog-content>
  <form [formGroup]="userForm">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Nom</mat-label>
      <input matInput formControlName="username">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width" *ngIf="!data.user">
      <mat-label>Mot de passe</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Rôle</mat-label>
      <input matInput formControlName="role">
    </mat-form-field>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Annuler</button>
  <button mat-flat-button color="primary" [disabled]="userForm.invalid" (click)="save()">Sauvegarder</button>
</div>
