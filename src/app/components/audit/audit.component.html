<app-welcome></app-welcome>

<div class="historique-container" *ngIf="!loading && !error">
  <h2>Historique des actions utilisateurs</h2>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Rechercher</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Recherche dans les colonnes..." />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- Date Column -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let log">
        {{ log.date | date: 'short' }}
      </td>
    </ng-container>

    <!-- Utilisateur Email Column -->
    <ng-container matColumnDef="utilisateurEmail">
      <th mat-header-cell *matHeaderCellDef>Utilisateur</th>
      <td mat-cell *matCellDef="let log">
        {{ log.utilisateurEmail }}
      </td>
    </ng-container>

    <!-- Action Column -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let log">
        {{ log.action }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['date', 'utilisateurEmail', 'action']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['date', 'utilisateurEmail', 'action']"></tr>
  </table>
</div>

<div *ngIf="loading" class="loading-spinner">
  <mat-spinner></mat-spinner>
</div>

<div *ngIf="error" class="error-message">
  {{ error }}
</div>
