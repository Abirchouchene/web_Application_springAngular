<app-welcome></app-welcome>

<div class="permission-container">

  <h2 class="title">Gestion des permissions</h2>

  <mat-card class="permission-card">
    <form (ngSubmit)="savePermission()" class="permission-form">

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nom de la permission</mat-label>
        <input
          matInput
          [(ngModel)]="permissionForm.nom"
          name="nom"
          required
          autocomplete="off"
        />
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          [(ngModel)]="permissionForm.description"
          name="description"
          rows="3"
        ></textarea>
      </mat-form-field>

      <div class="button-group">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="!permissionForm.nom"
        >
          {{ editingPermissionId ? 'Modifier' : 'Ajouter' }} la permission
        </button>
        <button mat-stroked-button type="button" (click)="resetForm()">
          Annuler
        </button>
      </div>

    </form>
  </mat-card>

  <h3 class="subtitle">Liste des permissions</h3>

  <mat-card>
    <table mat-table [dataSource]="permissions" class="mat-elevation-z8">

      <!-- Nom Column -->
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let permission">
          <strong>{{ permission.nom }}</strong>
        </td>
      </ng-container>

      <!-- Description Column -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let permission">
          {{ permission.description || '—' }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let permission">
          <button
            mat-icon-button
            color="accent"
            aria-label="Modifier"
            (click)="startEdit(permission)"
          >
            <mat-icon>edit</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['nom', 'description', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['nom', 'description', 'actions']"></tr>
    </table>
  </mat-card>

</div>
