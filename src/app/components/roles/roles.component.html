<app-welcome></app-welcome>

<div class="container mat-typography mt-4">

  <!-- Message d'erreur -->
  <mat-card *ngIf="errorMessage" class="mat-elevation-z3 mb-4">
    <mat-card-content class="text-danger">
      {{ errorMessage }}
    </mat-card-content>
  </mat-card>

  <!-- Bouton Ajouter un rôle -->
  <div class="mb-4">
    <button mat-raised-button color="primary" (click)="openAddRoleDialog()">
      <mat-icon>add</mat-icon> Ajouter un rôle
    </button>
  </div>

  <!-- Table des rôles -->
  <mat-card class="mat-elevation-z3">
    <mat-card-header>
      <mat-card-title>Liste des rôles</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="roles" class="mat-elevation-z1 w-100">

        <!-- Index -->
        <ng-container matColumnDef="index">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let role; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <!-- Nom -->
        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef>Nom</th>
          <td mat-cell *matCellDef="let role">{{ role.nom }}</td>
        </ng-container>

        <!-- Description -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let role">{{ role.description }}</td>
        </ng-container>

        <!-- Permissions -->
        <ng-container matColumnDef="permissions">
          <th mat-header-cell *matHeaderCellDef>Permissions</th>
          <td mat-cell *matCellDef="let role">
            <ng-container *ngIf="role.permissions?.length; else noPermissions">
              <mat-chip-list>
                <mat-chip *ngFor="let p of role.permissions" color="primary" selected>
                  {{ p.nom }}
                </mat-chip>
              </mat-chip-list>
            </ng-container>
            <ng-template #noPermissions>
              <span class="text-muted">Aucune</span>
            </ng-template>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['index', 'nom', 'description', 'permissions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['index', 'nom', 'description', 'permissions']"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
