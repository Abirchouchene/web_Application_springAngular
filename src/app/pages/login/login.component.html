<div class="container" *ngIf="!authResponse.mfaEnabled">
  <div class="login-card">
    <h2>Connexion</h2>
    <form (ngSubmit)="authenticate()">
      <div class="form-group">
        <label for="username">Email</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          [(ngModel)]="authRequest.email"
          placeholder="Entrez votre email"
        >
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          [(ngModel)]="authRequest.password"
          placeholder="Entrez votre mot de passe"
        >
      </div>
      <button type="submit" class="btn btn-primary">Se connecter</button>
      <a routerLink="/register" class="register-link">Créer un compte</a>
    </form>
  </div>
</div>

<div class="container" *ngIf="authResponse.mfaEnabled">
  <div class="login-card">
    <h2>Authentification à deux facteurs</h2>
    <div class="form-group">
      <label for="validationCode">Code de vérification à 6 chiffres</label>
      <input
        type="text"
        id="validationCode"
        name="validationCode"
        required
        [(ngModel)]="otpCode"
        placeholder="Entrez le code"
        maxlength="6"
        pattern="[0-9]{6}"
      >
    </div>
    <button
      type="button"
      (click)="verifyCode()"
      [ngClass]="{'btn': true, 'btn-primary': true, 'button-disabled': otpCode.length < 6}"
    >Vérifier le code</button>
  </div>
</div>
