# ============================================================
# PROFIL dev-local : Gateway sans Keycloak (VPN down)
# Lancer avec : mvn spring-boot:run -Dspring-boot.run.profiles=dev-local
# ============================================================
spring.application.name=api-gateway
server.port=9090

spring.cloud.config.enabled=false

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# DESACTIVER la validation JWT (pas de Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# ROUTES (identiques à la prod)
spring.cloud.gateway.routes[0].id=auth-service-mock
spring.cloud.gateway.routes[0].uri=http://localhost:9090
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=callcenter-requests
spring.cloud.gateway.routes[1].uri=lb://CALLCENTER
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/requests/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[2].id=callcenter-responses
spring.cloud.gateway.routes[2].uri=lb://CALLCENTER
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/response/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[3].id=callcenter-reports
spring.cloud.gateway.routes[3].uri=lb://CALLCENTER
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reports/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[4].id=callcenter-notifications
spring.cloud.gateway.routes[4].uri=lb://CALLCENTER
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[5].id=callcenter-logs
spring.cloud.gateway.routes[5].uri=lb://CALLCENTER
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/logs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[6].id=callcenter-contact-status
spring.cloud.gateway.routes[6].uri=lb://CALLCENTER
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/request-contact-status/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[7].id=callcenter-files
spring.cloud.gateway.routes[7].uri=lb://CALLCENTER
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/files/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[8].id=contact-service
spring.cloud.gateway.routes[8].uri=lb://CONTACT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/contacts/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/contacts/(?<segment>.*), /api/contacts/${segment}

spring.cloud.gateway.routes[9].id=callcenter-ws
spring.cloud.gateway.routes[9].uri=lb:ws://CALLCENTER
spring.cloud.gateway.routes[9].predicates[0]=Path=/ws/**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/ws/(?<segment>.*), /api/ws/${segment}

# CORS
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization

# LOGGING
logging.level.org.springframework.cloud.gateway=DEBUG

# ACTUATOR
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
