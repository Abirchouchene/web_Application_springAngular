spring.application.name=api-gateway
server.port=9090

# Disable Config Server import (optionnel, activer plus tard)
spring.cloud.config.enabled=false

# ============================================================
# EUREKA
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

# ============================================================
# JWT (Keycloak) - validation au niveau du Gateway
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://192.168.10.161:8080/realms/Portal
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://192.168.10.161:8080/realms/Portal/protocol/openid-connect/certs

# ============================================================
# ROUTES Gateway -> Microservices via Eureka (lb = load-balanced)
# ============================================================

# ---------- AUTH (Keycloak endpoints proxied via Gateway) ----------
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://192.168.10.161:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/auth/(?<segment>.*), /realms/Portal/protocol/openid-connect/${segment}

# ---------- CALLCENTER SERVICE ----------
spring.cloud.gateway.routes[1].id=callcenter-requests
spring.cloud.gateway.routes[1].uri=lb://CALLCENTER
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/requests/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[2].id=callcenter-responses
spring.cloud.gateway.routes[2].uri=lb://CALLCENTER
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/response/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[3].id=callcenter-reports
spring.cloud.gateway.routes[3].uri=lb://CALLCENTER
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reports/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[4].id=callcenter-notifications
spring.cloud.gateway.routes[4].uri=lb://CALLCENTER
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[5].id=callcenter-logs
spring.cloud.gateway.routes[5].uri=lb://CALLCENTER
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/logs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[6].id=callcenter-contact-status
spring.cloud.gateway.routes[6].uri=lb://CALLCENTER
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/request-contact-status/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[7].id=callcenter-files
spring.cloud.gateway.routes[7].uri=lb://CALLCENTER
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/files/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[8].id=callcenter-questions
spring.cloud.gateway.routes[8].uri=lb://CALLCENTER
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/questions/**,/api/questions
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# ---------- CONTACT SERVICE ----------
spring.cloud.gateway.routes[9].id=contact-service
spring.cloud.gateway.routes[9].uri=lb://CONTACT-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/contacts/**,/api/contacts
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# ---------- CALLBACK SERVICE (contact-service) ----------
spring.cloud.gateway.routes[10].id=callback-service
spring.cloud.gateway.routes[10].uri=lb://CONTACT-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/callbacks/**,/api/callbacks
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# ---------- USER / ADMIN MANAGEMENT (via CallCenter service) ----------
spring.cloud.gateway.routes[11].id=admin-users
spring.cloud.gateway.routes[11].uri=lb://CALLCENTER
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# ---------- DASHBOARD (CallCenter) ----------
spring.cloud.gateway.routes[12].id=callcenter-dashboard
spring.cloud.gateway.routes[12].uri=lb://CALLCENTER
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/dashboard/**
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

spring.cloud.gateway.routes[13].id=user-profile
spring.cloud.gateway.routes[13].uri=http://192.168.10.161:8080
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/users/profile
spring.cloud.gateway.routes[13].filters[0]=RewritePath=/api/users/profile, /realms/Portal/protocol/openid-connect/userinfo

# ---------- USER INFO (via CallCenter service) ----------
spring.cloud.gateway.routes[16].id=callcenter-user
spring.cloud.gateway.routes[16].uri=lb://CALLCENTER
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/user/**
spring.cloud.gateway.routes[16].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# ---------- WEBSOCKET (CallCenter) ----------
# SockJS HTTP handshake/info (must use HTTP, not WS)
spring.cloud.gateway.routes[14].id=callcenter-ws-http
spring.cloud.gateway.routes[14].uri=lb://CALLCENTER
spring.cloud.gateway.routes[14].predicates[0]=Path=/ws/info/**
spring.cloud.gateway.routes[14].filters[0]=RewritePath=/ws/(?<segment>.*), /api/ws/${segment}

# WebSocket upgrade
spring.cloud.gateway.routes[15].id=callcenter-ws
spring.cloud.gateway.routes[15].uri=lb:ws://CALLCENTER
spring.cloud.gateway.routes[15].predicates[0]=Path=/ws/**
spring.cloud.gateway.routes[15].filters[0]=RewritePath=/ws/(?<segment>.*), /api/ws/${segment}

# ---------- AI CHAT (CallCenter) ----------
spring.cloud.gateway.routes[17].id=callcenter-ai-chat
spring.cloud.gateway.routes[17].uri=lb://CALLCENTER
spring.cloud.gateway.routes[17].predicates[0]=Path=/api/ai-chat/**
spring.cloud.gateway.routes[17].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# ============================================================
# GATEWAY DEFAULT FILTERS
# ============================================================
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# ============================================================
# CORS Configuration (autorise Angular http://localhost:4200)
# ============================================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
