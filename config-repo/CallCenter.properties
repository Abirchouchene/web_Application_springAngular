# Shared config for CallCenter service (resolved by Config Server)
spring.application.name=CallCenter
server.servlet.context-path=/api
server.port=8082

### EUREKA CLIENT ###
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

### DATABASE ###
spring.datasource.url=jdbc:mysql://192.168.10.161:3306/call-center
spring.datasource.username=root
spring.datasource.password=root

### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.mvc.format.date=yyyy-MM-dd

# Keycloak
keycloak.auth-server-url=http://192.168.10.161:8080/realms/Portal
keycloak.realm=Portal
keycloak.client-id=callcenter-backend
keycloak.client-secret=lGNpcgyHlDiFcubxhQo9nxeItxkl6Rgr

spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://192.168.10.161:8080/realms/Portal/protocol/openid-connect/certs
jwt.auth.converter.principal-attribute=sub
