<mat-card class="cardWithShadow">
  <mat-card-header>
    <mat-card-title class="m-b-0">Gestion des Utilisateurs</mat-card-title>
  </mat-card-header>
  <mat-card-content class="p-24">
    <!-- Toolbar: search + add button -->
    <div class="d-flex align-items-center justify-content-between m-b-16">
      <mat-form-field appearance="outline" class="w-50">
        <mat-label>Rechercher un utilisateur</mat-label>
        <input matInput (keyup)="onSearch($event)" placeholder="Nom, email..." />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="openAddUserDialog()">
        <mat-icon>person_add</mat-icon>
        Ajouter un utilisateur
      </button>

      <button mat-stroked-button color="accent" (click)="syncFromKeycloak()" class="m-l-8">
        <mat-icon>sync</mat-icon>
        Sync Keycloak
      </button>
    </div>

    <!-- Loading spinner -->
    <div *ngIf="loading" class="d-flex justify-content-center p-24">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <!-- Table -->
    <div class="table-responsive" *ngIf="!loading">
      <table mat-table [dataSource]="dataSource" matSort class="w-100">

        <!-- Username -->
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom d'utilisateur</th>
          <td mat-cell *matCellDef="let user">{{ user.username }}</td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email }}</td>
        </ng-container>

        <!-- Full Name -->
        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom complet</th>
          <td mat-cell *matCellDef="let user">{{ user.fullName }}</td>
        </ng-container>

        <!-- Role -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Rôle</th>
          <td mat-cell *matCellDef="let user">{{ user.role }}</td>
        </ng-container>

        <!-- Enabled -->
        <ng-container matColumnDef="enabled">
          <th mat-header-cell *matHeaderCellDef>Statut</th>
          <td mat-cell *matCellDef="let user">
            <span class="bg-light-{{ user.enabled ? 'success' : 'error' }} text-{{ user.enabled ? 'success' : 'error' }} rounded f-w-600 p-6 p-y-4 f-s-12">
              {{ user.enabled ? 'Actif' : 'Désactivé' }}
            </span>
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let user">
            <button mat-icon-button [matMenuTriggerFor]="menu" matTooltip="Actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="toggleUserEnabled(user)">
                <mat-icon>{{ user.enabled ? 'block' : 'check_circle' }}</mat-icon>
                <span>{{ user.enabled ? 'Désactiver' : 'Activer' }}</span>
              </button>
              <button mat-menu-item (click)="sendResetEmail(user)">
                <mat-icon>email</mat-icon>
                <span>Envoyer email reset mdp</span>
              </button>
              <button mat-menu-item (click)="deleteUser(user)" class="text-error">
                <mat-icon color="warn">delete</mat-icon>
                <span>Supprimer</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- No data -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center p-24" [attr.colspan]="displayedColumns.length">
            Aucun utilisateur trouvé
          </td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
